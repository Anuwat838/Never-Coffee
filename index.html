<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TeamWork — ตารางงานทีม</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#5E8F33">
<link rel="icon" type="image/png" href="./icon-192.png">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="TeamWork">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --brand:#5E8F33; --brand-dark:#4A7526; --brand-soft:#ECF3DF;
  --red:#C8102E; --red-dark:#9E0B23; --red-soft:#FDECEF;
  --ink:#23281F; --g700:#4E5548; --g500:#7C8374; --g300:#D8DCD0; --g150:#EEF0E8; --g80:#F7F8F2;
  --white:#FFFFFF; --ok:#1B8A4C; --ok-soft:#E7F5EC; --warn:#B77800; --warn-soft:#FFF4DC;
  --shadow:0 2px 10px rgba(32,36,42,.08); --shadow-lg:0 10px 34px rgba(32,36,42,.16);
  --r:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Sarabun',sans-serif;background:var(--g80);color:var(--ink);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;font-size:inherit;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink);border:1.5px solid var(--g300);border-radius:10px;padding:10px 12px;background:var(--white);width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-soft)}
textarea{resize:vertical;min-height:84px}
label{display:block;font-weight:600;font-size:13px;color:var(--g700);margin:14px 0 6px}
a{color:var(--brand)}
.mono{font-family:'IBM Plex Mono',monospace}
.hide{display:none!important}

/* ---------- layout ---------- */
#app{min-height:100%;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--g150);box-shadow:0 1px 0 rgba(0,0,0,.02)}
.topbar-in{max-width:1080px;margin:0 auto;padding:0 16px;display:flex;align-items:center;gap:10px;height:56px}
.brand{display:flex;align-items:center;gap:9px;font-weight:800;font-size:17px;letter-spacing:.2px}
.brand .logo{width:30px;height:30px;border-radius:8px;background:var(--brand);color:#fff;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:14px}
img.logo,img.logo-lg{object-fit:cover;background:none;display:block}
.topbar .me{margin-left:auto;display:flex;align-items:center;gap:8px}
.avatar{width:32px;height:32px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:700;font-size:13px;flex:none}
.btn-ghost{color:var(--g500);font-size:13px;font-weight:600;padding:6px 10px;border-radius:8px}
.btn-ghost:hover{background:var(--g150);color:var(--ink)}

.tabs{max-width:1080px;margin:0 auto;padding:0 8px;display:flex;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{position:relative;padding:11px 14px;font-weight:600;font-size:14px;color:var(--g500);white-space:nowrap;border-bottom:3px solid transparent}
.tab.on{color:var(--brand);border-bottom-color:var(--brand)}
.tab .badge{position:absolute;top:6px;right:2px;width:8px;height:8px;border-radius:50%;background:var(--red)}

.main{flex:1;max-width:1080px;margin:0 auto;width:100%;padding:18px 16px 90px}
@media(min-width:720px){.main{padding-bottom:40px}}

/* ---------- buttons ---------- */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;font-weight:700;border-radius:10px;padding:10px 18px;transition:.15s}
.btn-red{background:var(--brand);color:#fff}
.btn-red:hover{background:var(--brand-dark)}
.btn-line{border:1.5px solid var(--g300);background:var(--white);color:var(--ink)}
.btn-line:hover{border-color:var(--g500)}
.btn-sm{padding:7px 12px;font-size:13px;border-radius:8px}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.fab{position:fixed;right:18px;bottom:22px;z-index:40;width:56px;height:56px;border-radius:50%;background:var(--brand);color:#fff;font-size:28px;box-shadow:var(--shadow-lg);display:grid;place-items:center}
@media(min-width:720px){.fab{right:calc(50% - 540px + 24px)}}

/* ---------- cards & chips ---------- */
.card{background:var(--white);border:1px solid var(--g150);border-radius:var(--r);box-shadow:var(--shadow)}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:99px}
.chip.todo{background:var(--g150);color:var(--g700)}
.chip.doing{background:var(--warn-soft);color:var(--warn)}
.chip.done{background:var(--ok-soft);color:var(--ok)}
.chip.urgent{background:var(--red-soft);color:var(--red)}
.chip.normal{background:var(--g150);color:var(--g500)}

/* task card — red date rail (signature) */
.task{display:flex;gap:0;overflow:hidden;margin-bottom:10px;cursor:pointer;transition:.15s}
.task:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
.task .rail{flex:none;width:64px;background:var(--g80);border-right:1px solid var(--g150);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;font-family:'IBM Plex Mono',monospace}
.task.urgent-rail .rail{background:var(--red);color:#fff;border-right-color:var(--red)}
.task .rail .d{font-size:21px;font-weight:600;line-height:1}
.task .rail .m{font-size:11px;margin-top:3px;opacity:.85}
.task .body{flex:1;padding:12px 14px;min-width:0}
.task .t{font-weight:700;font-size:15px;margin-bottom:5px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.task .meta{font-size:13px;color:var(--g500);display:flex;flex-wrap:wrap;gap:4px 14px}
.task.done-card{opacity:.62}
.assg{display:flex;margin-left:auto}
.assg .avatar{width:24px;height:24px;font-size:10px;border:2px solid #fff;margin-left:-7px}

/* ---------- filter bar ---------- */
.fbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fbar select{width:auto;padding:7px 10px;font-size:13px;border-radius:8px}
.seg{display:inline-flex;background:var(--g150);border-radius:9px;padding:3px}
.seg button{padding:6px 13px;font-size:13px;font-weight:700;border-radius:7px;color:var(--g500)}
.seg button.on{background:var(--white);color:var(--brand);box-shadow:var(--shadow)}

/* ---------- calendar ---------- */
.cal-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cal-head .mon{font-weight:800;font-size:17px;flex:1;text-align:center}
.cal-nav{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--g300);font-size:16px;background:#fff}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal .dow{text-align:center;font-size:11px;font-weight:700;color:var(--g500);padding:4px 0}
.cal .cell{background:var(--white);border:1px solid var(--g150);border-radius:8px;min-height:74px;padding:4px;cursor:pointer;overflow:hidden}
.cal .cell.dim{background:var(--g80);opacity:.55}
.cal .cell .n{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;color:var(--g500);padding:1px 3px}
.cal .cell.today .n{background:var(--brand);color:#fff;border-radius:6px;display:inline-block}
.cal .ev{font-size:10px;font-weight:600;padding:1px 4px;border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:var(--g150);color:var(--g700)}
.cal .ev.urgent{background:var(--red-soft);color:var(--red)}
.cal .ev.done{background:var(--ok-soft);color:var(--ok);text-decoration:line-through}
.cal .more{font-size:10px;color:var(--brand);font-weight:700;padding:1px 4px}
.week-col{background:var(--white);border:1px solid var(--g150);border-radius:8px;padding:6px;min-height:90px}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
@media(max-width:719px){.week-grid{grid-template-columns:1fr}.week-col{min-height:0}}

/* ---------- modal ---------- */
.overlay{position:fixed;inset:0;background:rgba(24,26,30,.5);z-index:90;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:720px){.overlay{align-items:center;padding:30px}}
.modal{background:var(--white);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;padding:20px}
@media(min-width:720px){.modal{border-radius:18px}}
.modal h3{font-size:18px;font-weight:800;display:flex;align-items:center}
.modal .x{margin-left:auto;width:32px;height:32px;border-radius:8px;font-size:17px;color:var(--g500)}
.modal .x:hover{background:var(--g150)}

/* ---------- detail ---------- */
.dt-row{display:flex;gap:10px;font-size:14px;margin:9px 0;color:var(--g700)}
.dt-row .ic{flex:none;width:20px;text-align:center}
.thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.thumbs img{width:76px;height:76px;object-fit:cover;border-radius:9px;border:1px solid var(--g150);cursor:pointer}
.thumbs .del{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;line-height:20px;text-align:center}
.thumb-wrap{position:relative}
.sect{font-size:13px;font-weight:800;color:var(--g500);letter-spacing:.4px;margin:20px 0 8px;display:flex;align-items:center;gap:8px}
.sect::after{content:"";flex:1;height:1px;background:var(--g150)}
.cmt{display:flex;gap:9px;margin-bottom:11px}
.cmt .bub{background:var(--g80);border-radius:4px 12px 12px 12px;padding:8px 12px;flex:1}
.cmt .who{font-size:12px;font-weight:700}
.cmt .when{font-size:11px;color:var(--g500);font-family:'IBM Plex Mono',monospace;margin-left:6px;font-weight:500}
.hist{border-left:2px solid var(--g150);margin-left:8px;padding-left:14px}
.hist .h-item{position:relative;padding-bottom:12px;font-size:13px;color:var(--g700)}
.hist .h-item::before{content:"";position:absolute;left:-19px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--g300)}
.hist .h-item:first-child::before{background:var(--brand)}
.hist .hw{font-weight:700;color:var(--ink)}
.hist .ht{font-size:11px;color:var(--g500);font-family:'IBM Plex Mono',monospace}
.hist .chg{background:var(--g80);border-radius:7px;padding:5px 9px;margin-top:4px;font-size:12.5px}
.hist .old{color:var(--g500);text-decoration:line-through}
.hist .new{color:var(--brand);font-weight:600}

/* ---------- chat ---------- */
.chat-wrap{display:flex;flex-direction:column;height:calc(100dvh - 210px);min-height:340px}
.chat-msgs{flex:1;overflow-y:auto;padding:6px 2px}
.msg{display:flex;gap:8px;margin-bottom:10px;max-width:82%}
.msg .bub{background:var(--white);border:1px solid var(--g150);border-radius:4px 14px 14px 14px;padding:8px 12px;box-shadow:var(--shadow)}
.msg.me{margin-left:auto;flex-direction:row-reverse}
.msg.me .bub{background:var(--brand);color:#fff;border-color:var(--brand);border-radius:14px 4px 14px 14px}
.msg .who{font-size:11.5px;font-weight:700;color:var(--g500);margin-bottom:2px}
.msg .when{font-size:10px;opacity:.65;font-family:'IBM Plex Mono',monospace;margin-top:3px;text-align:right}
.chat-in{display:flex;gap:8px;padding-top:10px}
.chat-in input{border-radius:99px}
.chat-in .send{width:44px;height:44px;flex:none;border-radius:50%;background:var(--brand);color:#fff;font-size:17px}
.day-div{text-align:center;font-size:11px;color:var(--g500);font-weight:700;margin:12px 0;font-family:'IBM Plex Mono',monospace}

/* ---------- dashboard ---------- */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:16px}
@media(min-width:720px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{padding:14px 16px}
.stat .n{font-family:'IBM Plex Mono',monospace;font-size:30px;font-weight:600;line-height:1.1}
.stat .l{font-size:12.5px;color:var(--g500);font-weight:600;margin-top:3px}
.stat.hl{background:var(--red);border-color:var(--red)}
.stat.hl .n,.stat.hl .l{color:#fff}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;font-size:13px}
.bar-row .nm{width:110px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-row .tr{flex:1;height:18px;background:var(--g150);border-radius:9px;overflow:hidden;display:flex}
.bar-row .sg{height:100%}
.bar-row .ct{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--g500);width:26px;text-align:right}

/* ---------- gallery ---------- */
.alb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
.alb{overflow:hidden;cursor:pointer;transition:.15s}
.alb:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.alb .cov{height:150px;background:var(--g150) center/cover no-repeat;display:grid;place-items:center;color:var(--g500);font-size:34px}
.alb .inf{padding:11px 13px}
.alb .t{font-weight:700;font-size:14.5px}
.alb .s{font-size:12px;color:var(--g500);margin-top:2px;font-family:'IBM Plex Mono',monospace}
.ph-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.ph-grid .ph{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;background:var(--g150)}
.ph-grid img{width:100%;height:100%;object-fit:cover;display:block}
.lightbox{position:fixed;inset:0;background:rgba(15,16,18,.93);z-index:120;display:flex;flex-direction:column}
.lightbox img{flex:1;object-fit:contain;min-height:0;width:100%}
.lightbox .lb-bar{display:flex;gap:14px;align-items:center;justify-content:center;padding:14px;color:#fff}
.lightbox .lb-bar button,.lightbox .lb-bar a{color:#fff;font-size:14px;font-weight:700;background:rgba(255,255,255,.14);padding:8px 16px;border-radius:99px;text-decoration:none}
.pub-head{background:var(--white);border-bottom:3px solid var(--brand);padding:22px 16px;text-align:center}
.pub-head h1{font-size:21px;font-weight:800}
.pub-head p{color:var(--g500);font-size:13.5px;margin-top:4px}

/* ---------- login ---------- */
.login-wrap{min-height:100dvh;display:grid;place-items:center;padding:20px;background:
  linear-gradient(160deg,var(--g80) 60%,var(--brand-soft))}
.login{width:100%;max-width:380px;padding:30px 26px}
.login .logo-lg{width:54px;height:54px;border-radius:14px;background:var(--brand);color:#fff;display:grid;place-items:center;font-family:'IBM Plex Mono',monospace;font-size:24px;font-weight:600;margin:0 auto 14px}
.login h1{text-align:center;font-size:21px;font-weight:800}
.login p{text-align:center;color:var(--g500);font-size:13.5px;margin-top:4px}
.err{background:var(--red-soft);color:var(--red);font-size:13px;font-weight:600;border-radius:9px;padding:9px 12px;margin-top:14px}

/* ---------- misc ---------- */
.empty{text-align:center;color:var(--g500);padding:44px 16px;font-size:14px}
.empty .big{font-size:38px;margin-bottom:8px}
#toast{position:fixed;left:50%;bottom:88px;transform:translateX(-50%);background:var(--ink);color:#fff;font-size:13.5px;font-weight:600;padding:10px 18px;border-radius:99px;z-index:200;box-shadow:var(--shadow-lg);opacity:0;transition:.25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1}
.spin{width:22px;height:22px;border:3px solid var(--g300);border-top-color:var(--brand);border-radius:50%;animation:sp 1s linear infinite;margin:0 auto}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-page{min-height:100dvh;display:grid;place-items:center}
.asg-pick{display:flex;flex-wrap:wrap;gap:7px}
.asg-pick .p{display:flex;align-items:center;gap:6px;border:1.5px solid var(--g300);border-radius:99px;padding:5px 12px 5px 6px;font-size:13px;font-weight:600;cursor:pointer;background:#fff}
.asg-pick .p.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
.up-zone{border:2px dashed var(--g300);border-radius:12px;padding:18px;text-align:center;color:var(--g500);font-size:13.5px;cursor:pointer;background:var(--g80)}
.up-zone:hover{border-color:var(--brand);color:var(--brand)}
progress{width:100%;height:8px;accent-color:var(--brand)}
</style>
</head>
<body>
<div id="app"><div class="loading-page"><div class="spin"></div></div></div>
<div id="toast"></div>
<script type="module">
/* ================================================================
   ⚙️ CONFIG — แก้ 2 จุดนี้ตาม SETUP_GUIDE.md
   ================================================================ */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyAXUSUI8x22lXey4J-_v3TCDu3cBI2Fil0",
  authDomain: "nevercoffee-teamwork.firebaseapp.com",
  projectId: "nevercoffee-teamwork",
  storageBucket: "nevercoffee-teamwork.firebasestorage.app",
  messagingSenderId: "414706038674",
  appId: "1:414706038674:web:ead80660a35bbeb292b34b"
};
// Apps Script Web App URL สำหรับแจ้งเตือน LINE (เว้นว่าง "" = ปิดการแจ้งเตือน)
const LINE_WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbyp7g1OcHUmKhv6BUEpuhRQqzqVGFD9oRi6IGLKHYl_9iTpRN9dGxqZezX2231SwFpC/exec";
const APP_NAME = "Never Coffee";
/* ================================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, limit, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* ---------------- helpers ---------------- */
const $ = s => document.querySelector(s);
const esc = s => String(s ?? "").replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const THM = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
const THD = ["อา","จ","อ","พ","พฤ","ศ","ส"];
const pad = n => String(n).padStart(2,"0");
const dstr = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayStr = () => dstr(new Date());
function fmtDate(s){ if(!s) return "-"; const [y,m,d]=s.split("-").map(Number); return `${d} ${THM[m-1]} ${y+543}`; }
function fmtTS(ts){ if(!ts) return ""; const d = ts.toDate ? ts.toDate() : new Date(ts);
  return `${d.getDate()} ${THM[d.getMonth()]} ${pad(d.getHours())}:${pad(d.getMinutes())}`; }
function toast(m){ const t=$("#toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove("show"),2400); }
const COLORS=["#5E8F33","#1B5FA8","#1B8A4C","#B77800","#7B3FA0","#0E7C86","#B0413E","#5A6169","#2E6E3E","#8C5A2B"];
function userColor(uid){ let h=0; for(const c of uid) h=(h*31+c.charCodeAt(0))>>>0; return COLORS[h%COLORS.length]; }
function av(u,sz){ const nm=(u&&u.displayName)||"?"; return `<span class="avatar" style="background:${u&&u.color?u.color:'#7A828C'}${sz?`;width:${sz}px;height:${sz}px;font-size:${Math.round(sz*0.42)}px`:''}" title="${esc(nm)}">${esc(nm.trim().charAt(0).toUpperCase())}</span>`; }
function notifyLine(text){ if(!LINE_WEBHOOK_URL) return;
  try{ fetch(LINE_WEBHOOK_URL+"?text="+encodeURIComponent(`[${APP_NAME}] `+text),{mode:"no-cors"}); }catch(e){} }

// บีบอัดรูปฝั่ง client → dataURL JPEG
function compressImage(file, maxSide=1280, quality=0.72){
  return new Promise((res,rej)=>{
    const img=new Image();
    img.onload=()=>{ let{width:w,height:h}=img;
      if(Math.max(w,h)>maxSide){ const r=maxSide/Math.max(w,h); w=Math.round(w*r); h=Math.round(h*r); }
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h);
      let out=cv.toDataURL("image/jpeg",quality);
      if(out.length>900000) out=cv.toDataURL("image/jpeg",0.5);
      URL.revokeObjectURL(img.src); res(out); };
    img.onerror=rej; img.src=URL.createObjectURL(file);
  });
}

/* ---------------- state ---------------- */
const STATUS={todo:"รอทำ",doing:"กำลังทำ",done:"เสร็จ"};

const S={

async function ensureProfile(user){
  const ref=doc(db,"users",user.uid);
  const snap=await getDoc(ref);
  if(snap.exists()) return snap.data();
  const username=(user.email||"").split("@")[0];
  const prof={username, displayName:username, color:userColor(user.uid), createdAt:serverTimestamp()};
  await setDoc(ref,prof); return prof;
}

function subscribeCore(){
  S.unsub.push(onSnapshot(collection(db,"users"), s=>{
    S.users={}; s.forEach(d=>S.users[d.id]={id:d.id,...d.data()});
    if(S.tab!=="chat") renderTab(false);
  }));
  S.unsub.push(onSnapshot(query(collection(db,"tasks"),orderBy("date","asc")), s=>{
    S.tasks=s.docs.map(d=>({id:d.id,...d.data()}));
    if(["sched","dash"].includes(S.tab)) renderTab(false);
  }));
  S.unsub.push(onSnapshot(query(collection(db,"chat"),orderBy("createdAt","desc"),limit(120)), s=>{
    S.chat=s.docs.map(d=>({id:d.id,...d.data()})).reverse();
    S.chatReady=true;
    if(S.tab==="chat"){ renderChatMsgs(); markChatRead(); } else updateChatBadge();
  }));
}
function lastChatTS(){ const m=S.chat[S.chat.length-1]; return m&&m.createdAt&&m.createdAt.toMillis?m.createdAt.toMillis():0; }
function markChatRead(){ localStorage.setItem("chatRead", String(lastChatTS())); updateChatBadge(); }
function updateChatBadge(){
  const b=$("#chat-badge"); if(!b) return;
  const last=S.chat[S.chat.length-1];
  const unread = last && last.uid!==S.user.uid && lastChatTS()>Number(localStorage.getItem("chatRead")||0);
  b.classList.toggle("hide",!unread);
}

function renderTab(scroll){
  if(!$("#page")) return;
  const fab=$("#fab");
  if(S.tab==="sched"){ fab.classList.remove("hide"); fab.dataset.act="new-task"; renderSched(); }
  else if(S.tab==="chat"){ fab.classList.add("hide"); renderChat(); markChatRead(); }
  else if(S.tab==="dash"){ fab.classList.add("hide"); renderDash(); }
  else if(S.tab==="gal"){ fab.classList.remove("hide"); fab.dataset.act="new-album"; renderGalAdmin(); }
  updateChatBadge();

/* ================================================================
   ตารางงาน — ปฏิทิน (เดือน/สัปดาห์) + ลิสต์

function filteredTasks(){
  return S.tasks.filter(t=>
    (!S.f.status||t.status===S.f.status)&&
    (!S.f.prio||t.priority===S.f.prio)&&
    (!S.f.asg||(t.assignees||[]).includes(S.f.asg))&&
    (!S.f.q||(t.title+" "+(t.location||"")+" "+(t.detail||"")).toLowerCase().includes(S.f.q.toLowerCase()))
  );
}
function taskCard(t){
  const [y,m,d]=t.date.split("-");
  const asg=(t.assignees||[]).map(uid=>S.users[uid]).filter(Boolean);
  return `<div class="card task ${t.priority==='urgent'&&t.status!=='done'?'urgent-rail':''} ${t.status==='done'?'done-card':''}" data-act="open-task" data-id="${t.id}">
    <div class="rail"><div class="d">${Number(d)}</div><div class="m">${THM[Number(m)-1]}</div></div>
    <div class="body">
      <div class="t">${esc(t.title)}
        <span class="chip ${t.status}">${STATUS[t.status]}</span>
        ${t.priority==="urgent"?`<span class="chip urgent">🔥 ด่วน</span>`:""}
        <span class="assg">${asg.slice(0,4).map(u=>av(u,24)).join("")}</span></div>
      <div class="meta">
        ${t.timeStart?`<span class="mono">🕐 ${t.timeStart}${t.timeEnd?"–"+t.timeEnd:""}</span>`:""}
        ${t.location?`<span>📍 ${esc(t.location)}</span>`:""}
        ${t.imageCount?`<span>🖼️ ${t.imageCount}</span>`:""}
        ${t.commentCount?`<span>💬 ${t.commentCount}</span>`:""}
      </div>
    </div></div>`;
}

function renderSchedBody(){

  if(S.calMode==="month") el.innerHTML=calMonthHTML();
  else if(S.calMode==="week") el.innerHTML=calWeekHTML();
  else el.innerHTML=listHTML();

function calHeadHTML(label){
  return `<div class="cal-head">
    <button class="cal-nav" data-act="cal-nav" data-d="-1">‹</button>
    <div class="mon">${label}</div>
    <button class="btn btn-line btn-sm" data-act="cal-today">วันนี้</button>
    <button class="cal-nav" data-act="cal-nav" data-d="1">›</button></div>`;
}
function calMonthHTML(){
  const base=S.calDate, y=base.getFullYear(), m=base.getMonth();
  const first=new Date(y,m,1), start=new Date(y,m,1-first.getDay());
  const tasks=filteredTasks(), today=todayStr();
  let cells="";
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const ds=dstr(d), dim=d.getMonth()!==m;
    const evs=tasks.filter(t=>t.date===ds);
    cells+=`<div class="cell ${dim?'dim':''} ${ds===today?'today':''}" data-act="cal-day" data-d="${ds}">
      <span class="n">${d.getDate()}</span>
      ${evs.slice(0,3).map(t=>`<div class="ev ${t.status==='done'?'done':(t.priority==='urgent'?'urgent':'')}">${esc(t.title)}</div>`).join("")}
      ${evs.length>3?`<div class="more">+${evs.length-3} งาน</div>`:""}
    </div>`;
  }
  return calHeadHTML(`${THM[m]} ${y+543}`)+`<div class="cal">${THD.map(d=>`<div class="dow">${d}</div>`).join("")}${cells}</div>`;
}
function calWeekHTML(){
  const base=new Date(S.calDate); base.setDate(base.getDate()-base.getDay());
  const end=new Date(base); end.setDate(base.getDate()+6);
  const tasks=filteredTasks(), today=todayStr();
  let cols="";
  for(let i=0;i<7;i++){
    const d=new Date(base); d.setDate(base.getDate()+i); const ds=dstr(d);
    const evs=tasks.filter(t=>t.date===ds);
    cols+=`<div class="week-col">
      <div style="font-weight:800;font-size:12.5px;margin-bottom:6px;${ds===today?'color:var(--brand)':''}">${THD[i]} <span class="mono">${d.getDate()}</span></div>
      ${evs.map(t=>`<div class="ev ${t.status==='done'?'done':(t.priority==='urgent'?'urgent':'')}" style="font-size:11.5px;padding:4px 6px;cursor:pointer" data-act="open-task" data-id="${t.id}">${t.timeStart?`<span class="mono">${t.timeStart}</span> `:""}${esc(t.title)}</div>`).join("")||`<div style="font-size:11px;color:var(--g300)">—</div>`}
    </div>`;
  }
  return calHeadHTML(`${fmtDate(dstr(base))} – ${fmtDate(dstr(end))}`)+`<div class="week-grid">${cols}</div>`;
}
function listHTML(){
  const tasks=filteredTasks();
  if(!tasks.length) return `<div class="empty"><div class="big">🗂️</div>ไม่มีงานตามเงื่อนไขที่เลือก<br>กดปุ่ม ＋ มุมขวาล่างเพื่อสร้างงานแรก</div>`;
  const groups={};
  tasks.forEach(t=>{ (groups[t.date]=groups[t.date]||[]).push(t); });
  const today=todayStr();
  return Object.keys(groups).sort().map(d=>`
    <div class="sect">${d===today?"📌 วันนี้ · ":""}${fmtDate(d)}</div>
    ${groups[d].map(taskCard).join("")}`).join("");
}

function openTaskForm(t){
  formImgs=[]; openModal(taskFormHTML(t));
  $("#asg-pick").addEventListener("click",e=>{ const p=e.target.closest(".p"); if(p) p.classList.toggle("on"); });
  $("#t-up").addEventListener("click",()=>$("#t-file").click());
  $("#t-file").addEventListener("change",async e=>{
    for(const f of e.target.files){ try{ formImgs.push(await compressImage(f)); }catch(_){toast("อ่านรูปไม่สำเร็จ");} }
    $("#t-thumbs").innerHTML=formImgs.map((d,i)=>`<span class="thumb-wrap"><img src="${d}"><button type="button" class="del" data-act="form-img-del" data-i="${i}">✕</button></span>`).join("");
    e.target.value="";
  });
  $("#task-f").addEventListener("submit",e=>{ e.preventDefault(); saveTask(t); });
}
const FIELD_TH={title:"ชื่องาน",date:"วันที่",timeStart:"เวลาเริ่ม",timeEnd:"เวลาสิ้นสุด",location:"สถานที่",mapLink:"ลิงก์แผนที่",detail:"รายละเอียด",status:"สถานะ",priority:"ความสำคัญ",assignees:"ผู้รับผิดชอบ"};
function fieldVal(k,v){
  if(k==="status") return STATUS[v]||"-";
  if(k==="priority") return PRIO[v]||"-";
  if(k==="date") return fmtDate(v);
  if(k==="assignees") return (v||[]).map(id=>S.users[id]?S.users[id].displayName:"?").join(", ")||"-";
  return v||"-";
}
async function saveTask(old){
  const btn=$("#t-save"); btn.disabled=true; btn.textContent="กำลังบันทึก…";
  const data={
    title:$("#t-title").value.trim(), date:$("#t-date").value,
    timeStart:$("#t-ts").value, timeEnd:$("#t-te").value,
    location:$("#t-loc").value.trim(), mapLink:$("#t-map").value.trim(),
    detail:$("#t-detail").value.trim(),
    status:$("#t-status").value, priority:$("#t-prio").value,
    assignees:[...document.querySelectorAll("#asg-pick .p.on")].map(p=>p.dataset.uid),
    updatedAt:serverTimestamp(), updatedBy:S.user.uid
  };
  try{
    const me=S.profile.displayName;
    if(old){ // แก้ไข → บันทึก history เฉพาะ field ที่เปลี่ยน
      const changes=[];
      for(const k of Object.keys(FIELD_TH)){
        const a=JSON.stringify(old[k]??""), b=JSON.stringify(data[k]??"");
        if(a!==b) changes.push({field:k,fieldTH:FIELD_TH[k],from:fieldVal(k,old[k]),to:fieldVal(k,data[k])});
      }
      await updateDoc(doc(db,"tasks",old.id),data);
      if(changes.length) await addDoc(collection(db,"tasks",old.id,"history"),
        {type:"edit",by:S.user.uid,byName:me,changes,createdAt:serverTimestamp()});
      await addFormImgs(old.id, old.imageCount||0);
      if(changes.some(c=>c.field==="status"))
        notifyLine(`🔄 "${data.title}" เปลี่ยนสถานะเป็น ${STATUS[data.status]} โดย ${me}`);
      toast("บันทึกการแก้ไขแล้ว");
    }else{
      data.createdAt=serverTimestamp(); data.createdBy=S.user.uid; data.imageCount=0; data.commentCount=0;
      const ref=await addDoc(collection(db,"tasks"),data);
      await addDoc(collection(db,"tasks",ref.id,"history"),
        {type:"create",by:S.user.uid,byName:me,changes:[],createdAt:serverTimestamp()});
      await addFormImgs(ref.id,0);
      notifyLine(`🆕 งานใหม่: "${data.title}" วันที่ ${fmtDate(data.date)}${data.location?" @"+data.location:""} โดย ${me}`);
      toast("สร้างงานแล้ว");
    }
    closeModal();
  }catch(ex){ console.error(ex); toast("บันทึกไม่สำเร็จ ลองอีกครั้ง"); btn.disabled=false; btn.textContent="บันทึก"; }
}
async function addFormImgs(taskId, baseCount){
  if(!formImgs.length) return;
  for(const d of formImgs) await addDoc(collection(db,"tasks",taskId,"images"),{data:d,by:S.user.uid,createdAt:serverTimestamp()});
  await updateDoc(doc(db,"tasks",taskId),{imageCount:baseCount+formImgs.length});
  await addDoc(collection(db,"tasks",taskId,"history"),
    {type:"image",by:S.user.uid,byName:S.profile.displayName,changes:[{fieldTH:"รูปภาพ",from:"",to:`เพิ่ม ${formImgs.length} รูป`}],createdAt:serverTimestamp()});
  formImgs=[];
}

async function deleteTask(id){
  const t=S.tasks.find(x=>x.id===id);
  if(!confirm(`ลบงาน "${t.title}" ถาวร?\nคอมเมนต์และประวัติจะถูกลบด้วย`)) return;

function openExport(){

  openModal(`<h3>⬇ Export Excel<button class="x" data-act="close">✕</button></h3>

    </div>
    <button class="btn btn-red" style="width:100%;margin-top:20px" data-act="do-export">ดาวน์โหลดไฟล์ Excel</button>`);

function doExport(){
  const from=$("#x-from").value, to=$("#x-to").value;
  const rows=S.tasks.filter(t=>t.date>=from&&t.date<=to).map(t=>({
    "วันที่":t.date,"เวลา":t.timeStart?`${t.timeStart}${t.timeEnd?"-"+t.timeEnd:""}`:"",
    "ชื่องาน":t.title,"สถานะ":STATUS[t.status],"ความสำคัญ":PRIO[t.priority],
    "ผู้รับผิดชอบ":(t.assignees||[]).map(u=>S.users[u]?.displayName||"?").join(", "),
    "สถานที่":t.location||"","ลิงก์แผนที่":t.mapLink||"","รายละเอียด":t.detail||"",
    "สร้างโดย":S.users[t.createdBy]?.displayName||""
  }));
  if(!rows.length){ toast("ไม่มีงานในช่วงวันที่นี้"); return; }
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:11},{wch:12},{wch:30},{wch:9},{wch:9},{wch:20},{wch:22},{wch:24},{wch:40},{wch:12}];
  const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,"ตารางงาน");
  XLSX.writeFile(wb,`ตารางงาน_${from}_ถึง_${to}.xlsx`);
  closeModal(); toast("ดาวน์โหลดแล้ว");
}

function renderChatMsgs(){
  const el=$("#chat-msgs"); if(!el) return;
  if(!S.chatReady){ el.innerHTML=`<div class="spin" style="margin-top:30px"></div>`; return; }
  if(!S.chat.length){ el.innerHTML=`<div class="empty"><div class="big">💬</div>ยังไม่มีข้อความ — ทักทายทีมได้เลย</div>`; return; }
  let html="", lastDay="";
  for(const m of S.chat){
    const d=m.createdAt&&m.createdAt.toDate?m.createdAt.toDate():new Date();
    const day=dstr(d);
    if(day!==lastDay){ html+=`<div class="day-div">— ${fmtDate(day)} —</div>`; lastDay=day; }
    const me=m.uid===S.user.uid, u=S.users[m.uid];
    html+=`<div class="msg ${me?"me":""}">${me?"":av(u,30)}
      <div class="bub">${me?"":`<div class="who" style="color:${u?u.color:'#888'}">${esc(m.byName)}</div>`}

      <div class="when">${pad(d.getHours())}:${pad(d.getMinutes())}</div></div></div>`;
  }
  el.innerHTML=html; el.scrollTop=el.scrollHeight;
}

function renderDash(){
  const T=S.tasks, today=todayStr();
  const wk=new Date(); wk.setDate(wk.getDate()-wk.getDay());
  const wkEnd=new Date(wk); wkEnd.setDate(wk.getDate()+6);
  const inWeek=t=>t.date>=dstr(wk)&&t.date<=dstr(wkEnd);
  const cnt=s=>T.filter(t=>t.status===s).length;
  const urgent=T.filter(t=>t.priority==="urgent"&&t.status!=="done");
  const todayTasks=T.filter(t=>t.date===today&&t.status!=="done");
  const users=Object.values(S.users);
  const perUser=users.map(u=>{
    const all=T.filter(t=>(t.assignees||[]).includes(u.id));
    return {u, todo:all.filter(t=>t.status==="todo").length, doing:all.filter(t=>t.status==="doing").length, done:all.filter(t=>t.status==="done").length, total:all.length};
  }).filter(x=>x.total>0).sort((a,b)=>b.total-a.total);
  const maxT=Math.max(1,...perUser.map(x=>x.total));
  $("#page").innerHTML=`
    <div class="stats">
      <div class="card stat hl"><div class="n">${urgent.length}</div><div class="l">🔥 งานด่วนค้างอยู่</div></div>
      <div class="card stat"><div class="n">${cnt("todo")}</div><div class="l">รอทำ</div></div>
      <div class="card stat"><div class="n">${cnt("doing")}</div><div class="l">กำลังทำ</div></div>
      <div class="card stat"><div class="n">${cnt("done")}</div><div class="l">เสร็จแล้ว</div></div>
    </div>
    <div class="sect">งานวันนี้ (${todayTasks.length}) · สัปดาห์นี้ ${T.filter(inWeek).length} งาน</div>
    ${todayTasks.length?todayTasks.map(taskCard).join(""):`<div class="empty" style="padding:18px">ไม่มีงานค้างของวันนี้ 🎉</div>`}
    ${urgent.length?`<div class="sect">งานด่วนทั้งหมด</div>${urgent.map(taskCard).join("")}`:""}
    <div class="sect">ภาระงานต่อคน</div>
    <div class="card" style="padding:16px 18px">
      ${perUser.length?perUser.map(x=>`<div class="bar-row">
        <span class="nm">${av(x.u,20)} ${esc(x.u.displayName)}</span>
        <span class="tr">
          <span class="sg" style="width:${x.todo/maxT*100}%;background:var(--g300)" title="รอทำ ${x.todo}"></span>
          <span class="sg" style="width:${x.doing/maxT*100}%;background:var(--warn)" title="กำลังทำ ${x.doing}"></span>
          <span class="sg" style="width:${x.done/maxT*100}%;background:var(--ok)" title="เสร็จ ${x.done}"></span>
        </span><span class="ct">${x.total}</span></div>`).join("")
      :`<div style="color:var(--g500);font-size:13.5px">ยังไม่มีการมอบหมายงาน</div>`}
      <div style="display:flex;gap:14px;font-size:11.5px;color:var(--g500);margin-top:10px">
        <span>▪️<span style="color:var(--g500)"> รอทำ</span></span><span style="color:var(--warn)">▪️ กำลังทำ</span><span style="color:var(--ok)">▪️ เสร็จ</span>
      </div>
    </div>

}

    <div class="ph-grid" id="g-grid" style="margin-top:16px"><div class="spin"></div></div>`;
  $("#g-up").addEventListener("click",()=>$("#g-file").click());
  $("#g-file").addEventListener("change",e=>uploadAlbumPhotos(id,[...e.target.files]));
  if(S._albSub) S._albSub();
  S._albSub=onSnapshot(query(collection(db,"galleries",id,"photos"),orderBy("createdAt","asc")),s=>{
    S.gPhotos=s.docs.map(d=>({id:d.id,...d.data()}));
    const el=$("#g-grid"); if(!el) return;
    el.innerHTML=S.gPhotos.length?S.gPhotos.map((p,i)=>`<div class="ph">
      <img src="${p.data}" data-act="lightbox" data-i="${i}" loading="lazy">
      <button class="del" style="position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(20,22,25,.75);color:#fff" data-act="del-photo" data-aid="${id}" data-id="${p.id}">✕</button>
    </div>`).join(""):`<div class="empty" style="grid-column:1/-1">ยังไม่มีรูป — อัปโหลดรูปแรกได้เลย</div>`;
  });
}
async function uploadAlbumPhotos(albumId, files){
  if(!files.length) return;
  const prog=$("#g-prog"), bar=$("#g-bar"), txt=$("#g-txt");
  prog.classList.remove("hide");
  let done=0, firstData="";
  for(const f of files){
    try{
      const d=await compressImage(f);
      if(!firstData) firstData=d;
      await addDoc(collection(db,"galleries",albumId,"photos"),{data:d,by:S.user.uid,createdAt:serverTimestamp()});
    }catch(_){ toast("บางรูปอัปโหลดไม่สำเร็จ"); }
    done++; bar.value=Math.round(done/files.length*100);
    txt.textContent=`อัปโหลดแล้ว ${done}/${files.length} รูป`;
  }
  const a=S.galleries.find(x=>x.id===albumId);
  const upd={photoCount:(a?.photoCount||0)+done};
  if(a&&!a.cover&&firstData){
    // ทำ thumbnail ปกขนาดเล็ก
    upd.cover=await shrinkDataURL(firstData,420);
  }
  await updateDoc(doc(db,"galleries",albumId),upd);
  prog.classList.add("hide"); $("#g-file").value="";
  toast(`เพิ่ม ${done} รูปแล้ว`);
}
function shrinkDataURL(dataURL,maxSide){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>{ let{width:w,height:h}=img;
      const r=maxSide/Math.max(w,h); if(r<1){w=Math.round(w*r);h=Math.round(h*r);}
      const cv=document.createElement("canvas"); cv.width=w; cv.height=h;
      cv.getContext("2d").drawImage(img,0,0,w,h); res(cv.toDataURL("image/jpeg",0.65)); };
    img.src=dataURL;
  });
}
async function deleteAlbumPhoto(albumId,photoId){
  if(!confirm("ลบรูปนี้?")) return;
  await deleteDoc(doc(db,"galleries",albumId,"photos",photoId));
  const a=S.galleries.find(x=>x.id===albumId);
  await updateDoc(doc(db,"galleries",albumId),{photoCount:Math.max(0,(a?.photoCount||1)-1)});
}
async function deleteAlbum(id){
  const a=S.galleries.find(x=>x.id===id);
  if(!confirm(`ลบอัลบั้ม "${a.title}" และรูปทั้งหมด (${a.photoCount||0} รูป) ถาวร?`)) return;
  const s=await getDocs(collection(db,"galleries",id,"photos"));
  for(const d of s.docs) await deleteDoc(d.ref);
  await deleteDoc(doc(db,"galleries",id));
  S.openAlbum=null; renderTab(true); toast("ลบอัลบั้มแล้ว");
}

/* ================================================================
   EVENT DELEGATION + BOOT
   ================================================================ */
document.addEventListener("click", e=>{
  const el=e.target.closest("[data-act]"); if(!el) return;
  const act=el.dataset.act, id=el.dataset.id;
  switch(act){
    case "tab": S.tab=el.dataset.t; renderShell(); break;
    case "logout": if(confirm("ออกจากระบบ?")) signOut(auth); break;
    case "edit-name": {
      const nm=prompt("ชื่อที่แสดง:",S.profile.displayName);
      if(nm&&nm.trim()){ updateDoc(doc(db,"users",S.user.uid),{displayName:nm.trim()}); S.profile.displayName=nm.trim(); renderShell(); }
      break; }
    case "close": closeModal(); break;
    case "fab": break;
    case "new-task": openTaskForm(null); break;
    case "open-task": openTaskDetail(id); break;
    case "edit-task": { const t=S.tasks.find(x=>x.id===id); closeModal(); openTaskForm(t); break; }
    case "del-task": deleteTask(id); break;
    case "add-img": $("#d-file").click(); break;
    case "del-img": deleteTaskImg(el.dataset.tid,id); break;
    case "form-img-del": formImgs.splice(Number(el.dataset.i),1);
      $("#t-thumbs").innerHTML=formImgs.map((d,i)=>`<span class="thumb-wrap"><img src="${d}"><button type="button" class="del" data-act="form-img-del" data-i="${i}">✕</button></span>`).join(""); break;
    case "task-lightbox": S.gPhotos=S.taskImgs; openLightbox(Number(el.dataset.i)); break;
    case "calmode": S.calMode=el.dataset.m; renderSched(); break;
    case "cal-nav": {
      const d=Number(el.dataset.d);
      if(S.calMode==="week") S.calDate.setDate(S.calDate.getDate()+7*d);
      else S.calDate.setMonth(S.calDate.getMonth()+d);
      renderSchedBody(); break; }
    case "cal-today": S.calDate=new Date(); renderSchedBody(); break;
    case "cal-day": { const ds=el.dataset.d;
      const evs=filteredTasks().filter(t=>t.date===ds);
      if(evs.length===1) openTaskDetail(evs[0].id);
      else openModal(`<h3>📅 ${fmtDate(ds)}<button class="x" data-act="close">✕</button></h3>
        <div style="margin-top:12px">${evs.length?evs.map(taskCard).join("")
          :`<div class="empty" style="padding:22px">ไม่มีงานในวันนี้</div>`}</div>
        <button class="btn btn-red" style="width:100%;margin-top:8px" data-act="new-task-day" data-d="${ds}">＋ สร้างงานวันที่นี้</button>`);
      break; }
    case "new-task-day": { const d=el.dataset.d; openTaskForm(null); $("#t-date").value=d; break; }
    case "export": openExport(); break;
    case "do-export": doExport(); break;
    case "new-album": openAlbumForm(); break;
    case "open-album": S.openAlbum=id; renderAlbumAdmin(id); break;
    case "back-gal": S.openAlbum=null; if(S._albSub){S._albSub();S._albSub=null;} renderGalAdmin(); break;
    case "copy-link": navigator.clipboard.writeText(shareLink(id)).then(()=>toast("คัดลอกลิงก์แล้ว — ส่งให้ใครก็เปิดดูได้"))
      .catch(()=>prompt("คัดลอกลิงก์นี้:",shareLink(id))); break;
    case "del-photo": deleteAlbumPhoto(el.dataset.aid,id); break;
    case "del-album": deleteAlbum(id); break;
    case "pub-open": location.search="?album="+id; break;
    case "lightbox": openLightbox(Number(el.dataset.i)); break;
    case "lb-close": $("#lb").remove(); break;
    case "lb-nav": {
      const lb=$("#lb"); let i=Number(lb.dataset.i)+Number(el.dataset.d);
      if(i<0) i=S.gPhotos.length-1; if(i>=S.gPhotos.length) i=0;
      lb.remove(); openLightbox(i); break; }
  }
});
document.addEventListener("keydown",e=>{ if(e.key==="Escape"){ const lb=$("#lb"); if(lb){lb.remove();return;} closeModal(); }});

/* ================================================================
   PWA — ติดตั้งเป็นแอปบน Android / iPhone
   ================================================================ */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
}
const IS_STANDALONE = matchMedia("(display-mode: standalone)").matches || navigator.standalone===true;
const IS_IOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
let deferredInstall=null;
window.addEventListener("beforeinstallprompt",e=>{
  e.preventDefault(); deferredInstall=e; showInstallChip();
});
window.addEventListener("appinstalled",()=>{ deferredInstall=null; const c=$("#install-chip"); if(c)c.remove(); toast("ติดตั้งแอปแล้ว 🎉"); });
function showInstallChip(){
  if(IS_STANDALONE||$("#install-chip")) return;
  const b=document.createElement("button");
  b.id="install-chip"; b.className="btn btn-red btn-sm"; b.textContent="⬇ ติดตั้งแอป";
  b.style.cssText="position:fixed;left:16px;bottom:24px;z-index:60;box-shadow:var(--shadow-lg);border-radius:99px";
  b.onclick=async()=>{ if(!deferredInstall) return; deferredInstall.prompt(); await deferredInstall.userChoice; deferredInstall=null; b.remove(); };
  document.body.appendChild(b);
}
function iosInstallHint(){
  return (IS_IOS&&!IS_STANDALONE)?`<div style="margin-top:16px;background:var(--g80);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--g700)">
    📲 <b>ติดตั้งลง iPhone:</b> เปิดหน้านี้ใน Safari → กดปุ่มแชร์ <span class="mono">⎋</span> → เลือก <b>"เพิ่มลงไปยังหน้าจอโฮม"</b></div>`:"";
}

if(PUBLIC_GALLERY){
  bootPublic();
}else{
  onAuthStateChanged(auth, async user=>{
    S.unsub.forEach(u=>u()); S.unsub=[];
    if(!user){ S.user=null; S.profile=null; renderLogin(); return; }
    S.user=user;
    try{ S.profile=await ensureProfile(user); }
    catch(ex){ console.error(ex); renderLogin("โหลดข้อมูลผู้ใช้ไม่สำเร็จ — ตรวจสอบ Firestore Rules"); return; }
    S.profile.color=S.profile.color||userColor(user.uid);
    subscribeCore(); renderShell();
  });
}
</script>
